<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RJPQ test</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --p1: #2196F3; --p2: #FF9800; --p3: #E91E63; --p4: #4CAF50; --bg: #121212; }
        * { touch-action: manipulation; box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; overflow-x: hidden; }
        
        .panel { background: #222; padding: 12px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #333; }
        input { padding: 10px; border-radius: 6px; border: none; width: 150px; background: #333; color: white; font-size: 16px; margin-bottom: 10px; }
        button { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; color: white; font-weight: bold; }
        
        /* 角色顯示 */
        #my-role-display { font-size: 18px; font-weight: bold; margin: 10px 0; padding: 5px; border-radius: 5px; display: none; }
        .bg-p1 { background: var(--p1); } .bg-p2 { background: var(--p2); }
        .bg-p3 { background: var(--p3); } .bg-p4 { background: var(--p4); }

        .main-layout { display: flex; justify-content: center; gap: 5px; margin: 0 auto; max-width: 100vw; }
        .row-labels { display: flex; flex-direction: column; gap: 4px; margin-top: 22px; }
        .row-label { height: 45px; display: flex; align-items: center; justify-content: flex-end; width: 25px; color: #888; font-size: 11px; }
        
        .grid-container { width: 280px; } /* 固定寬度防止手機跑版 */
        .col-labels { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-bottom: 5px; color: #888; font-size: 12px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
        
        .cell {
            background: #2d2d2d; height: 45px; border-radius: 4px; border: 1px solid #444; position: relative;
            display: flex; align-items: center; justify-content: center; font-size: 20px;
        }

        .x { position: absolute; font-size: 10px; font-weight: bold; display: none; pointer-events: none; }
        .x1 { top: 2px; left: 4px; color: var(--p1); }
        .x2 { top: 2px; right: 4px; color: var(--p2); }
        .x3 { bottom: 2px; left: 4px; color: var(--p3); }
        .x4 { bottom: 2px; right: 4px; color: var(--p4); }
        .show { display: block; }
        
        .v1 { border: 2px solid var(--p1); background: rgba(33,150,243,0.3); }
        .v2 { border: 2px solid var(--p2); background: rgba(255,152,0,0.3); }
        .v3 { border: 2px solid var(--p3); background: rgba(233,30,99,0.3); }
        .v4 { border: 2px solid var(--p4); background: rgba(76,175,80,0.3); }

        .host-ctrl { border-top: 1px solid #444; margin-top: 10px; padding-top: 10px; }
        .kick-btn { background: #ff4444; font-size: 10px; padding: 2px 6px; margin-left: 10px; }
    </style>
</head>
<body>

<div class="panel" id="lobby">
    <div id="conn-controls">
        <input type="text" id="roomId" placeholder="房號">
        <button onclick="start(true)" style="background: #e91e63;">開房</button>
        <button onclick="start(false)" style="background: #444;">加入</button>
    </div>
    <div id="my-role-display"></div>
    <p id="status-msg" style="font-size: 12px; color: #aaa;">請輸入房號</p>
    
    <div id="host-tools" class="host-ctrl" style="display:none;">
        <button onclick="resetGame()" style="background: #607d8b; width:100%; margin-bottom:10px;">下一場 (重置)</button>
        <div id="peer-list" style="font-size: 12px; text-align: left;"></div>
    </div>
</div>

<div class="main-layout" id="game" style="display:none;">
    <div class="row-labels" id="row-labels"></div>
    <div class="grid-container">
        <div class="col-labels"><div>1</div><div>2</div><div>3</div><div>4</div></div>
        <div class="grid" id="grid"></div>
    </div>
</div>

<script>
let peer, conn, myRole = null, isHost = false, gameState = {}, connections = {};
const iceConfig = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };

function start(asHost) {
    const rid = document.getElementById('roomId').value;
    if(!rid) return alert("請輸入房號");
    isHost = asHost;
    
    // 房主 ID 固定，隊友 ID 隨機
    const peerId = asHost ? `artale-${rid}` : null;
    peer = new Peer(peerId, { config: iceConfig });

    peer.on('open', (id) => {
        document.getElementById('conn-controls').style.display = 'none';
        document.getElementById('status-msg').innerText = asHost ? "等待隊友加入..." : "正在連接房主...";
        if(asHost) {
            myRole = 'p1';
            showRole();
            document.getElementById('host-tools').style.display = 'block';
            document.getElementById('game').style.display = 'flex';
            renderGrid();
        } else {
            connectToHost(`artale-${rid}`);
        }
    });

    peer.on('connection', (c) => {
        if(isHost) {
            // 房主邏輯：分配角色
            let assignedRole = `p${Object.keys(connections).length + 2}`;
            if (Object.keys(connections).length >= 3) {
                c.on('open', () => c.send({type: 'error', msg: '房間已滿'}));
                return;
            }
            connections[assignedRole] = c;
            c.on('open', () => {
                c.send({type: 'assignRole', role: assignedRole});
                c.send({type: 'sync', state: gameState});
                updatePeerList();
            });
            setupConn(c);
        }
    });

    peer.on('error', (err) => {
        alert("連線失敗：" + err.type);
        location.reload();
    });
}

function connectToHost(hostId) {
    const c = peer.connect(hostId);
    setupConn(c);
}

function setupConn(c) {
    c.on('data', (data) => {
        if(data.type === 'assignRole') {
            myRole = data.role;
            showRole();
            document.getElementById('game').style.display = 'flex';
            document.getElementById('status-msg').innerText = "連線成功";
        } else if(data.type === 'sync' || data.type === 'update') {
            gameState = data.state;
            renderGrid();
        } else if(data.type === 'reset') {
            gameState = {};
            renderGrid();
        } else if(data.type === 'kick') {
            alert("你已被房主踢出");
            location.reload();
        } else if(data.type === 'error') {
            alert(data.msg);
            location.reload();
        }

        if(isHost && data.type === 'update') {
            broadcast({type: 'sync', state: gameState});
        }
    });
    c.on('close', () => {
        if(isHost) {
            for(let r in connections) if(connections[r] === c) delete connections[r];
            updatePeerList();
        } else {
            alert("與房主連線中斷");
            location.reload();
        }
    });
}

function showRole() {
    const el = document.getElementById('my-role-display');
    el.style.display = 'block';
    el.className = 'bg-' + myRole;
    el.innerText = "你的角色: " + myRole.toUpperCase();
}

function broadcast(msg) {
    for(let r in connections) connections[r].send(msg);
}

function renderGrid() {
    const grid = document.getElementById('grid');
    const labelContainer = document.getElementById('row-labels');
    grid.innerHTML = ''; labelContainer.innerHTML = '';
    for (let r = 10; r >= 1; r--) {
        const lb = document.createElement('div');
        lb.className = 'row-label'; lb.innerText = r + 'F';
        labelContainer.appendChild(lb);
        for (let c = 1; c <= 4; c++) {
            const id = `r${r}c${c}`, d = gameState[id] || {}, div = document.createElement('div');
            div.className = `cell ${getVClass(d)}`;
            div.innerHTML = `
                <div class="x x1 ${d.p1==='W'?'show':''}">X</div>
                <div class="x x2 ${d.p2==='W'?'show':''}">X</div>
                <div class="x x3 ${d.p3==='W'?'show':''}">X</div>
                <div class="x x4 ${d.p4==='W'?'show':''}">X</div>
                ${getVMark(d)}
            `;
            div.onclick = () => handleClick(r, c);
            grid.appendChild(div);
        }
    }
}

function getVClass(d) {
    for(let i=1; i<=4; i++) if(d['p'+i]==='V') return 'v'+i;
    return '';
}

function getVMark(d) {
    for(let i=1; i<=4; i++) if(d['p'+i]==='V') return '✓';
    return '';
}

function handleClick(r, c) {
    if(!myRole) return;
    const id = `r${r}c${c}`;
    if(!gameState[id]) gameState[id] = {};
    let current = gameState[id][myRole] || 'N', next;
    if(current === 'N') next = 'W';
    else if(current === 'W') {
        if(Object.keys(gameState[id]).some(p => gameState[id][p] === 'V')) { alert("隊友已佔用"); next = 'N'; }
        else next = 'V';
    } else next = 'N';
    gameState[id][myRole] = next;
    if(next === 'V') for(let i=1; i<=4; i++) if(i !== c) {
        const oid = `r${r}c${i}`; if(!gameState[oid]) gameState[oid] = {};
        gameState[oid][myRole] = 'W';
    }
    renderGrid();
    if(isHost) broadcast({type: 'sync', state: gameState});
    else peer.connections[`artale-${document.getElementById('roomId').value}`][0].send({type: 'update', state: gameState});
}

function resetGame() { if(confirm("確定重置？")) { gameState = {}; renderGrid(); broadcast({type: 'reset'}); } }

function updatePeerList() {
    const list = document.getElementById('peer-list');
    list.innerHTML = '連線狀態：<br>P1 (房主: 你)<br>';
    for(let r in connections) {
        list.innerHTML += `${r.toUpperCase()} (在線) <button class="kick-btn" onclick="kick('${r}')">踢出</button><br>`;
    }
}
function kick(role) { connections[role].send({type: 'kick'}); connections[role].close(); delete connections[role]; updatePeerList(); }
</script>
</body>
</html>
