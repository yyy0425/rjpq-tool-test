<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>RJPQ test</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --p1: #2196F3; --p2: #FF9800; --p3: #E91E63; --p4: #4CAF50; --bg: #121212; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 10px; }
        
        /* 版面配置 */
        .main-layout { display: flex; justify-content: center; align-items: flex-start; gap: 10px; margin-top: 10px; }
        .row-labels { display: flex; flex-direction: column; gap: 5px; margin-top: 30px; }
        .row-label { height: 60px; display: flex; align-items: center; color: #888; font-size: 14px; }
        
        .grid-container { display: flex; flex-direction: column; gap: 5px; }
        .col-labels { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 5px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; width: 320px; }
        
        .cell {
            background: #2d2d2d; height: 60px; border: 1px solid #444; position: relative;
            cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: 0.1s;
        }
        .cell:hover { background: #3d3d3d; }

        /* 標記樣式 */
        .x { position: absolute; font-size: 10px; font-weight: bold; display: none; pointer-events: none; }
        .x1 { top: 3px; left: 5px; color: var(--p1); }
        .x2 { top: 3px; right: 5px; color: var(--p2); }
        .x3 { bottom: 3px; left: 5px; color: var(--p3); }
        .x4 { bottom: 3px; right: 5px; color: var(--p4); }
        .show { display: block; }
        
        .v1 { border: 2px solid var(--p1); background: rgba(33,150,243,0.25); }
        .v2 { border: 2px solid var(--p2); background: rgba(255,152,0,0.25); }
        .v3 { border: 2px solid var(--p3); background: rgba(233,30,99,0.25); }
        .v4 { border: 2px solid var(--p4); background: rgba(76,175,80,0.25); }

        /* 面板與按鈕 */
        .panel { background: #222; padding: 15px; border-radius: 8px; max-width: 500px; margin: 0 auto 10px; border: 1px solid #333; }
        input { padding: 8px; border-radius: 4px; border: none; width: 120px; background: #333; color: white; }
        button { padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; color: white; font-weight: bold; }
        .host-ctrl { border-top: 1px solid #444; margin-top: 15px; padding-top: 10px; }
        .active-role { outline: 3px solid white; transform: scale(1.05); }
        .kick-btn { background: #ff4444; font-size: 10px; padding: 2px 5px; margin-left: 5px; }
    </style>
</head>
<body>

<div class="panel" id="lobby">
    <div id="connection-step">
        <input type="text" id="roomId" placeholder="輸入房號">
        <button onclick="initPeer(true)" style="background: #e91e63;">創建房間 (房主)</button>
        <button onclick="initPeer(false)" style="background: #444;">加入房間</button>
    </div>
    
    <div id="role-select" style="display:none; margin-top:10px;">
        <span id="conn-info" style="font-size: 13px; color: #aaa;"></span><br><br>
        <button onclick="setRole('p1')" id="b1" style="background:var(--p1)">P1</button>
        <button onclick="setRole('p2')" id="b2" style="background:var(--p2)">P2</button>
        <button onclick="setRole('p3')" id="b3" style="background:var(--p3)">P3</button>
        <button onclick="setRole('p4')" id="b4" style="background:var(--p4)">P4</button>
    </div>

    <div id="host-tools" class="host-ctrl" style="display:none;">
        <span style="color: #ffeb3b; font-size: 12px;">房主權限：</span>
        <button onclick="resetGame()" style="background: #607d8b; font-size: 12px;">全場重置</button>
        <div id="peer-list" style="font-size: 11px; margin-top: 5px;">隊友列表：</div>
    </div>
</div>

<div class="main-layout" id="game" style="display:none;">
    <div class="row-labels">
        </div>
    <div class="grid-container">
        <div class="col-labels">
            <span>1</span><span>2</span><span>3</span><span>4</span>
        </div>
        <div class="grid" id="grid"></div>
    </div>
</div>

<script>
let peer, conn, myRole = null, isHost = false;
let gameState = {};
let connections = []; // 房主專用，儲存所有連進來的 conn

function initPeer(asHost) {
    const rid = document.getElementById('roomId').value;
    if(!rid) return alert("請輸入房號");
    isHost = asHost;
    
    const peerId = asHost ? `artale-rjpq-${rid}` : null;
    peer = new Peer(peerId);

    peer.on('open', (id) => {
        document.getElementById('connection-step').style.display = 'none';
        document.getElementById('role-select').style.display = 'block';
        if(asHost) {
            document.getElementById('host-tools').style.display = 'block';
            document.getElementById('conn-info').innerText = "房主在線中 (房號: " + rid + ")";
        } else {
            document.getElementById('conn-info').innerText = "正在連線到 " + rid + "...";
            connectToHost(`artale-rjpq-${rid}`);
        }
    });

    peer.on('connection', (c) => {
        handleIncomingConn(c);
    });

    peer.on('error', (err) => {
        if(err.type === 'unavailable-id') alert("該房號已被佔用！");
        else alert("連線錯誤: " + err.type);
    });
}

function connectToHost(hostId) {
    const c = peer.connect(hostId);
    handleIncomingConn(c);
}

function handleIncomingConn(c) {
    conn = c; 
    if(isHost) connections.push(c);

    c.on('open', () => {
        document.getElementById('game').style.display = 'flex';
        updatePeerList();
        if(isHost) c.send({type: 'sync', state: gameState});
    });

    c.on('data', (data) => {
        if(data.type === 'update' || data.type === 'sync') {
            gameState = data.state;
            renderGrid();
        } else if(data.type === 'reset') {
            gameState = {};
            renderGrid();
        } else if(data.type === 'kick') {
            alert("你已被房主踢出！");
            location.reload();
        }
        
        // 房主轉發所有更新給其他隊友
        if(isHost && data.type === 'update') {
            broadcast({type: 'sync', state: gameState});
        }
    });

    c.on('close', () => {
        connections = connections.filter(con => con.peer !== c.peer);
        updatePeerList();
    });
}

function broadcast(msg) {
    connections.forEach(c => {
        if(c.open) c.send(msg);
    });
}

function setRole(r) {
    myRole = r;
    document.querySelectorAll('#role-select button').forEach(b => b.classList.remove('active-role'));
    document.getElementById('b'+r.slice(1)).classList.add('active-role');
    renderGrid();
}

function renderGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    
    // 樓層標籤 (10F -> 1F)
    const labelContainer = document.querySelector('.row-labels');
    labelContainer.innerHTML = '';

    for (let r = 10; r >= 1; r--) {
        const lb = document.createElement('div');
        lb.className = 'row-label';
        lb.innerText = r + 'F';
        labelContainer.appendChild(lb);

        for (let c = 1; c <= 4; c++) {
            const id = `r${r}c${c}`;
            const d = gameState[id] || {};
            const div = document.createElement('div');
            div.className = `cell ${getVClass(d)}`;
            div.innerHTML = `
                <div class="x x1 ${d.p1==='W'?'show':''}">X</div>
                <div class="x x2 ${d.p2==='W'?'show':''}">X</div>
                <div class="x x3 ${d.p3==='W'?'show':''}">X</div>
                <div class="x x4 ${d.p4==='W'?'show':''}">X</div>
                ${getVMark(d)}
            `;
            div.onclick = () => handleClick(r, c);
            grid.appendChild(div);
        }
    }
}

function getVClass(d) {
    for(let i=1; i<=4; i++) if(d['p'+i]==='V') return 'v'+i;
    return '';
}

function getVMark(d) {
    for(let i=1; i<=4; i++) if(d['p'+i]==='V') return '✓';
    return '';
}

function handleClick(r, c) {
    if(!myRole) return alert("請先選擇 P1~P4 角色");
    const id = `r${r}c${c}`;
    if(!gameState[id]) gameState[id] = {};
    
    let current = gameState[id][myRole] || 'N';
    let nextStatus;

    if(current === 'N') nextStatus = 'W';
    else if(current === 'W') {
        // 【防佔位核心】：檢查是否有人已經勾選這格
        const isClaimed = Object.keys(gameState[id]).some(p => gameState[id][p] === 'V');
        if(isClaimed) {
            alert("這格已被隊友勾選！");
            nextStatus = 'N'; 
        } else {
            nextStatus = 'V';
        }
    } else {
        nextStatus = 'N';
    }
    
    gameState[id][myRole] = nextStatus;

    // 唯一解聯動：設為正確時，自動排掉該行其他格
    if(nextStatus === 'V') {
        for(let i=1; i<=4; i++) {
            if(i !== c) {
                const otherId = `r${r}c${i}`;
                if(!gameState[otherId]) gameState[otherId] = {};
                gameState[otherId][myRole] = 'W';
            }
        }
    }
    
    renderGrid();
    
    const msg = {type: 'update', state: gameState};
    if(isHost) broadcast({type: 'sync', state: gameState});
    else if(conn) conn.send(msg);
}

// 房主管理：踢人
function kickPeer(peerId) {
    const c = connections.find(con => con.peer === peerId);
    if(c) {
        c.send({type: 'kick'});
        setTimeout(() => c.close(), 500);
    }
}

// 房主管理：重置
function resetGame() {
    if(confirm("確定要重置全場嗎？")) {
        gameState = {};
        renderGrid();
        broadcast({type: 'reset'});
    }
}

function updatePeerList() {
    if(!isHost) return;
    const list = document.getElementById('peer-list');
    list.innerHTML = '隊友清單：<br>';
    connections.forEach(c => {
        list.innerHTML += `${c.peer} <button class="kick-btn" onclick="kickPeer('${c.peer}')">踢出</button><br>`;
    });
}
</script>
</body>
</html>
