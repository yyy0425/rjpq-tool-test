<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RJPQ test</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --p1: #2196F3; --p2: #FF9800; --p3: #E91E63; --p4: #4CAF50; --bg: #121212; }
        * { touch-action: manipulation; box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; overflow-x: hidden; }
        .panel { background: #222; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #333; }
        input { padding: 10px; border-radius: 6px; border: none; width: 140px; background: #333; color: white; font-size: 16px; }
        button { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; color: white; font-weight: bold; margin-top: 5px; }
        #my-role-display { font-size: 16px; font-weight: bold; margin: 10px 0; padding: 10px; border-radius: 8px; display: none; }
        .bg-p1 { background: var(--p1); } .bg-p2 { background: var(--p2); } .bg-p3 { background: var(--p3); } .bg-p4 { background: var(--p4); }
        .main-layout { display: flex; justify-content: center; gap: 5px; margin: 0 auto; }
        .row-labels { display: flex; flex-direction: column; gap: 4px; margin-top: 22px; }
        .row-label { height: 45px; display: flex; align-items: center; justify-content: flex-end; width: 25px; color: #888; font-size: 11px; }
        .grid-container { width: 280px; }
        .col-labels { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-bottom: 5px; color: #888; font-size: 12px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
        .cell { background: #2d2d2d; height: 45px; border-radius: 4px; border: 1px solid #444; position: relative; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .x { position: absolute; font-size: 10px; font-weight: bold; display: none; pointer-events: none; }
        .x1 { top: 2px; left: 4px; color: var(--p1); } .x2 { top: 2px; right: 4px; color: var(--p2); }
        .x3 { bottom: 2px; left: 4px; color: var(--p3); } .x4 { bottom: 2px; right: 4px; color: var(--p4); }
        .show { display: block; }
        .v1 { border: 2px solid var(--p1); background: rgba(33,150,243,0.3); }
        .v2 { border: 2px solid var(--p2); background: rgba(255,152,0,0.3); }
        .v3 { border: 2px solid var(--p3); background: rgba(233,30,99,0.3); }
        .v4 { border: 2px solid var(--p4); background: rgba(76,175,80,0.3); }
        #debug-log { font-size: 10px; color: #888; background: #000; padding: 10px; margin-top: 20px; border-radius: 5px; text-align: left; height: 100px; overflow-y: auto; line-height: 1.4; border: 1px solid #333; }
        .kick-btn { background: #ff4444; font-size: 10px; padding: 2px 6px; margin-left: 10px; }
    </style>
</head>
<body>

<div class="panel" id="lobby">
    <div id="conn-controls">
        <input type="text" id="roomId" placeholder="輸入房號">
        <button onclick="start(true)" style="background: #e91e63;">創建房間</button>
        <button onclick="start(false)" style="background: #444;">加入房間</button>
    </div>
    <div id="my-role-display"></div>
    <div id="host-tools" style="display:none; border-top:1px solid #444; margin-top:10px; padding-top:10px;">
        <button onclick="resetGame()" style="background: #607d8b; width:100%;">下一場 (重置)</button>
        <div id="peer-list" style="font-size: 12px; text-align: left; margin-top:10px;"></div>
    </div>
</div>

<div class="main-layout" id="game" style="display:none;">
    <div class="row-labels" id="row-labels"></div>
    <div class="grid-container">
        <div class="col-labels"><div>1</div><div>2</div><div>3</div><div>4</div></div>
        <div class="grid" id="grid"></div>
    </div>
</div>

<div id="debug-log">系統日誌 > 準備就緒</div>

<script>
let peer, hostConn, myRole = null, isHost = false, gameState = {};
// 房主專用槽位管理
let slots = { p2: null, p3: null, p4: null };

const iceConfig = { iceServers: [
    { urls: "stun:stun.l.google.com:19302" },
    { urls: "stun:stun1.l.google.com:19302" },
    { urls: "stun:stun.services.mozilla.com" }
]};

function log(msg) {
    const d = document.getElementById('debug-log');
    d.innerHTML += `<br>> ${msg}`;
    d.scrollTop = d.scrollHeight;
}

function start(asHost) {
    const rid = document.getElementById('roomId').value;
    if(!rid) return alert("請輸入房號");
    isHost = asHost;
    
    // 房主 ID 使用 v4 版確保不衝突
    const peerId = asHost ? `rjpq-v4-${rid}` : null;
    peer = new Peer(peerId, { config: iceConfig });

    peer.on('open', (id) => {
        log(`我的網路 ID: ${id}`);
        document.getElementById('conn-controls').style.display = 'none';
        if(asHost) {
            myRole = 'p1';
            showRole();
            document.getElementById('host-tools').style.display = 'block';
            document.getElementById('game').style.display = 'flex';
            renderGrid();
            log("房主模式：等待隊友連線...");
        } else {
            log("隊友模式：嘗試尋找房主...");
            connectToHost(`rjpq-v4-${rid}`);
        }
    });

    peer.on('connection', (c) => {
        if(!isHost) return;
        log(`偵測到新連線: ${c.peer}`);
        
        // 尋找空槽位
        let role = null;
        if (!slots.p2) role = 'p2';
        else if (!slots.p3) role = 'p3';
        else if (!slots.p4) role = 'p4';

        if (!role) {
            log("房間已滿，拒絕加入");
            c.on('open', () => c.send({type: 'error', msg: '房間已滿'}));
            return;
        }

        slots[role] = c;
        setupConn(c, role);
    });

    peer.on('error', (err) => {
        log(`！！網路錯誤: ${err.type}`);
        if(err.type === 'peer-unavailable') log("找不到房主，請確認房號是否正確且房主已開房。");
    });
}

function connectToHost(hostId) {
    hostConn = peer.connect(hostId, { reliable: true });
    setupConn(hostConn, null);
    
    // 強制超時重連邏輯
    setTimeout(() => {
        if(!myRole) {
            log("連線緩慢，嘗試第二次握手...");
            hostConn.close();
            hostConn = peer.connect(hostId, { reliable: true });
            setupConn(hostConn, null);
        }
    }, 5000);
}

function setupConn(c, role) {
    c.on('open', () => {
        if(isHost) {
            log(`已開啟數據通道: ${role.toUpperCase()}`);
            c.send({type: 'assignRole', role: role});
            c.send({type: 'sync', state: gameState});
            updatePeerList();
        } else {
            log("已連上房主，等待分配角色...");
        }
    });

    c.on('data', (data) => {
        if(data.type === 'assignRole') {
            myRole = data.role;
            showRole();
            document.getElementById('game').style.display = 'flex';
            log(`分配成功！你是 ${myRole.toUpperCase()}`);
        } else if(data.type === 'sync' || data.type === 'update') {
            gameState = data.state;
            renderGrid();
        } else if(data.type === 'reset') {
            gameState = {};
            renderGrid();
            log("房主重置了遊戲");
        } else if(data.type === 'kick') {
            alert("你已被踢出");
            location.reload();
        } else if(data.type === 'error') {
            alert(data.msg);
            location.reload();
        }

        // 核心：房主轉發數據給所有人 (Relay)
        if(isHost && data.type === 'update') {
            broadcast({type: 'sync', state: gameState});
        }
    });

    c.on('close', () => {
        if(isHost) {
            log(`${role} 斷開連線`);
            slots[role] = null;
            updatePeerList();
        } else {
            log("房主斷開了，請重新加入");
            alert("與房主斷開");
            location.reload();
        }
    });
}

function showRole() {
    const el = document.getElementById('my-role-display');
    el.style.display = 'block';
    el.className = 'bg-' + myRole;
    el.innerText = "你的位置: " + myRole.toUpperCase();
}

function broadcast(msg) {
    for(let r in slots) if(slots[r] && slots[r].open) slots[r].send(msg);
}

function renderGrid() {
    const grid = document.getElementById('grid');
    const labelContainer = document.getElementById('row-labels');
    grid.innerHTML = ''; labelContainer.innerHTML = '';
    for (let r = 10; r >= 1; r--) {
        const lb = document.createElement('div');
        lb.className = 'row-label'; lb.innerText = r + 'F';
        labelContainer.appendChild(lb);
        for (let c = 1; c <= 4; c++) {
            const id = `r${r}c${c}`, d = gameState[id] || {}, div = document.createElement('div');
            div.className = `cell ${getVClass(d)}`;
            div.innerHTML = `
                <div class="x x1 ${d.p1==='W'?'show':''}">X</div>
                <div class="x x2 ${d.p2==='W'?'show':''}">X</div>
                <div class="x x3 ${d.p3==='W'?'show':''}">X</div>
                <div class="x x4 ${d.p4==='W'?'show':''}">X</div>
                ${getVMark(d)}
            `;
            div.onclick = () => handleClick(r, c);
            grid.appendChild(div);
        }
    }
}

function getVClass(d) {
    for(let i=1; i<=4; i++) if(d['p'+i]==='V') return 'v'+i;
    return '';
}
function getVMark(d) {
    for(let i=1; i<=4; i++) if(d['p'+i]==='V') return '✓';
    return '';
}

function handleClick(r, c) {
    if(!myRole) return;
    const id = `r${r}c${c}`;
    if(!gameState[id]) gameState[id] = {};
    let current = gameState[id][myRole] || 'N', next;
    
    if(current === 'N') next = 'W';
    else if(current === 'W') {
        // 防佔位
        if(Object.keys(gameState[id]).some(p => gameState[id][p] === 'V')) { alert("隊友已佔用此格"); next = 'N'; }
        else next = 'V';
    } else next = 'N';
    
    gameState[id][myRole] = next;
    if(next === 'V') {
        for(let i=1; i<=4; i++) if(i !== c) {
            const oid = `r${r}c${i}`; if(!gameState[oid]) gameState[oid] = {};
            gameState[oid][myRole] = 'W';
        }
    }
    renderGrid();
    if(isHost) broadcast({type: 'sync', state: gameState});
    else if(hostConn) hostConn.send({type: 'update', state: gameState});
}

function resetGame() { if(confirm("重置全場？")) { gameState = {}; renderGrid(); broadcast({type: 'reset'}); } }

function updatePeerList() {
    const list = document.getElementById('peer-list');
    list.innerHTML = '房間名單：<br>P1 (房主: 你)<br>';
    for(let r in slots) {
        if(slots[r]) {
            list.innerHTML += `${r.toUpperCase()} (連線中) <button class="kick-btn" onclick="kick('${r}')">踢</button><br>`;
        } else {
            list.innerHTML += `<span style="color:#555">${r.toUpperCase()} (空位)</span><br>`;
        }
    }
}
function kick(role) { 
    if(slots[role]) {
        slots[role].send({type: 'kick'}); 
        setTimeout(() => { slots[role].close(); slots[role] = null; updatePeerList(); }, 300);
    }
}
</script>
</body>
</html>
