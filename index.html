<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RJPQ 終極 Firebase 版</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --p1: #2196F3; --p2: #FF9800; --p3: #E91E63; --p4: #4CAF50; --bg: #121212; }
        * { touch-action: manipulation; box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        
        .panel { background: #222; padding: 12px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #333; }
        #role-tag { font-size: 16px; font-weight: bold; margin: 10px 0; padding: 8px; border-radius: 8px; display: none; }
        .bg-p1 { background: var(--p1); } .bg-p2 { background: var(--p2); } .bg-p3 { background: var(--p3); } .bg-p4 { background: var(--p4); }

        /* 表格配置 */
        .main-layout { display: flex; justify-content: center; gap: 5px; margin: 0 auto; max-width: 100vw; }
        .row-labels { display: flex; flex-direction: column; gap: 4px; margin-top: 25px; }
        .row-label { height: 45px; display: flex; align-items: center; justify-content: flex-end; width: 30px; color: #888; font-size: 11px; }
        .grid-container { width: 280px; }
        .col-labels { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-bottom: 5px; color: #888; font-size: 13px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
        
        .cell { background: #2d2d2d; height: 45px; border-radius: 4px; border: 1px solid #444; position: relative; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .x { position: absolute; font-size: 10px; font-weight: bold; display: none; pointer-events: none; }
        .x1 { top: 2px; left: 4px; color: var(--p1); } .x2 { top: 2px; right: 4px; color: var(--p2); }
        .x3 { bottom: 2px; left: 4px; color: var(--p3); } .x4 { bottom: 2px; right: 4px; color: var(--p4); }
        .show { display: block; }
        
        /* 佔用樣式 */
        .v1 { border: 2px solid var(--p1); background: rgba(33,150,243,0.3); }
        .v2 { border: 2px solid var(--p2); background: rgba(255,152,0,0.3); }
        .v3 { border: 2px solid var(--p3); background: rgba(233,30,99,0.3); }
        .v4 { border: 2px solid var(--p4); background: rgba(76,175,80,0.3); }

        .btn { padding: 8px 15px; border: none; border-radius: 6px; cursor: pointer; color: white; font-weight: bold; font-size: 14px; margin-top: 5px; }
        .host-tools { border-top: 1px solid #444; margin-top: 10px; padding-top: 10px; }
    </style>
</head>
<body>

<div class="panel">
    <div id="init-panel">
        <input type="text" id="roomId" placeholder="房號 (如 123)" style="padding:8px; border-radius:4px; border:none; width:120px;">
        <button class="btn" style="background: #e91e63;" onclick="connect()">開始連線</button>
    </div>
    <div id="role-tag"></div>
    <div id="host-panel" class="host-tools" style="display:none;">
        <button class="btn" style="background: #607d8b; width:100%;" onclick="resetAll()">房主重置 (下一場)</button>
    </div>
</div>

<div class="main-layout" id="game" style="display:none;">
    <div class="row-labels" id="row-labels"></div>
    <div class="grid-container">
        <div class="col-labels"><div>1</div><div>2</div><div>3</div><div>4</div></div>
        <div class="grid" id="grid"></div>
    </div>
</div>

<script>
// --- 請填入你的 Firebase 設定 ---
const firebaseConfig = {
    apiKey: "1:226816625045:web:bb501fb83c161e64318e9c",
    databaseURL: "https://rjpq-79e56-default-rtdb.asia-southeast1.firebasedatabase.app/",
    projectId: "rjpq-79e56",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let myRole = null, roomId = null, myRef = null;

function connect() {
    roomId = document.getElementById('roomId').value;
    if(!roomId) return alert("請輸入房號");

    // 自動分配角色邏輯
    const roomRef = db.ref('rooms/' + roomId + '/players');
    roomRef.transaction((currentPlayers) => {
        if (currentPlayers === null) return { p1: { online: true } };
        if (!currentPlayers.p1) return { ...currentPlayers, p1: { online: true } };
        if (!currentPlayers.p2) return { ...currentPlayers, p2: { online: true } };
        if (!currentPlayers.p3) return { ...currentPlayers, p3: { online: true } };
        if (!currentPlayers.p4) return { ...currentPlayers, p4: { online: true } };
        return; // 房間已滿
    }, (error, committed, snapshot) => {
        if (committed) {
            // 找出剛才分配給我的角色
            const players = snapshot.val();
            myRole = Object.keys(players).find(k => players[k].online && !myRef); 
            // 這裡簡單處理：依序加入
            initGame();
        } else {
            alert("房間已滿或連線失敗");
        }
    });
}

function initGame() {
    // 監聽自己的連線狀態，斷線自動釋放角色
    myRef = db.ref(`rooms/${roomId}/players/${myRole}`);
    myRef.onDisconnect().remove();

    document.getElementById('init-panel').style.display = 'none';
    const tag = document.getElementById('role-tag');
    tag.innerText = "你的角色: " + myRole.toUpperCase();
    tag.className = 'bg-' + myRole;
    tag.style.display = 'block';
    if(myRole === 'p1') document.getElementById('host-panel').style.display = 'block';
    document.getElementById('game').style.display = 'flex';

    // 監聽格子資料同步
    db.ref(`rooms/${roomId}/grid`).on('value', (snap) => {
        renderGrid(snap.val() || {});
    });
}

function renderGrid(data) {
    const grid = document.getElementById('grid');
    const labelContainer = document.getElementById('row-labels');
    grid.innerHTML = ''; labelContainer.innerHTML = '';

    for (let r = 10; r >= 1; r--) {
        const lb = document.createElement('div');
        lb.className = 'row-label'; lb.innerText = r + 'F';
        labelContainer.appendChild(lb);
        for (let c = 1; c <= 4; c++) {
            const id = `r${r}c${c}`, d = data[id] || {}, div = document.createElement('div');
            div.className = `cell ${getVClass(d)}`;
            div.innerHTML = `
                <div class="x x1 ${d.p1==='W'?'show':''}">X</div>
                <div class="x x2 ${d.p2==='W'?'show':''}">X</div>
                <div class="x x3 ${d.p3==='W'?'show':''}">X</div>
                <div class="x x4 ${d.p4==='W'?'show':''}">X</div>
                ${getVMark(d)}
            `;
            div.onclick = () => handleClick(r, c, d);
            grid.appendChild(div);
        }
    }
}

function getVClass(d) {
    for(let i=1; i<=4; i++) if(d['p'+i]==='V') return 'v'+i;
    return '';
}
function getVMark(d) {
    for(let i=1; i<=4; i++) if(d['p'+i]==='V') return '✓';
    return '';
}

function handleClick(r, c, cellData) {
    const current = cellData[myRole] || 'N';
    let next;
    if(current === 'N') next = 'W';
    else if(current === 'W') {
        // 防佔位
        if(Object.keys(cellData).some(p => cellData[p] === 'V')) { alert("隊友已佔用"); return; }
        next = 'V';
    } else next = 'N';

    const updates = {};
    updates[`rooms/${roomId}/grid/r${r}c${c}/${myRole}`] = next;

    // 唯一解連動
    if(next === 'V') {
        for(let i=1; i<=4; i++) if(i !== c) {
            updates[`rooms/${roomId}/grid/r${r}c${i}/${myRole}`] = 'W';
        }
    }
    db.ref().update(updates);
}

function resetAll() {
    if(confirm("重置全場進入下一場？")) {
        db.ref(`rooms/${roomId}/grid`).remove();
    }
}
</script>
</body>
</html>
